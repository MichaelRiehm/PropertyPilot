name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w backend

      - name: Typecheck + build (backend)
        run: npm run build -w backend

      - name: Typecheck + build (frontend)
        run: npm run build -w frontend

      - name: Backend tests
        run: npm run test -w backend

      - name: Frontend tests
        run: npm run test -w frontend
