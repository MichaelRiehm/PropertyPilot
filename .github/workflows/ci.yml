name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w backend

      - name: Typecheck + build (backend)
        run: npm run build -w backend

      - name: Typecheck + build (frontend)
        run: npm run build -w frontend

      - name: Backend tests
        run: npm run test -w backend

      - name: Frontend tests
        run: npm run test -w frontend

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: propertypilot
          POSTGRES_PASSWORD: propertypilot
          POSTGRES_DB: propertypilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U propertypilot -d propertypilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://propertypilot:propertypilot@localhost:5432/propertypilot?schema=public
      JWT_SECRET: e2e-ci-secret-do-not-use-in-production
      FRONTEND_URL: http://localhost:5173
      PORT: '4000'
      E2E_BASE_URL: http://localhost:5173
      E2E_BACKEND_HEALTH: http://localhost:4000/api/health
      E2E_BYPASS_AUTH_RATE_LIMIT: '1'
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root workspace dependencies
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: e2e
        run: npx playwright install-deps chromium

      - name: Generate Prisma client
        run: npm run prisma:generate -w backend

      - name: Apply DB migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Seed the DB
        run: npx ts-node prisma/seed.ts
        working-directory: backend

      - name: Start backend (background)
        run: npm run dev -w backend > backend.log 2>&1 &

      - name: Start frontend (background)
        run: npm run dev -w frontend > frontend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4000/api/health > /dev/null; then
              echo "backend up"; exit 0
            fi
            sleep 1
          done
          echo "backend never came up"; cat backend.log; exit 1

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:5173/ > /dev/null; then
              echo "frontend up"; exit 0
            fi
            sleep 1
          done
          echo "frontend never came up"; cat frontend.log; exit 1

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs
          path: |
            backend.log
            frontend.log
          retention-days: 7

  deploy:
    # Only runs on push to main (i.e. after a PR is merged). PR CI runs
    # test + e2e only; nothing deploys until those are green AND the merge
    # lands on main.
    name: Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      # Only one deploy at a time; a newer push cancels any in-flight deploy.
      group: deploy-render
      cancel-in-progress: false

    steps:
      - name: Trigger backend deploy
        env:
          HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK secret is not set; skipping."
            exit 1
          fi
          curl -fsS -X POST "$HOOK" | head -c 500
          echo

      - name: Trigger frontend deploy
        env:
          HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK secret is not set; skipping."
            exit 1
          fi
          curl -fsS -X POST "$HOOK" | head -c 500
          echo
