services:
  postgres:
    image: postgres:16-alpine
    container_name: propertypilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: propertypilot
      POSTGRES_PASSWORD: propertypilot
      POSTGRES_DB: propertypilot
    ports:
      - "5432:5432"
    volumes:
      - propertypilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propertypilot -d propertypilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  propertypilot_pgdata:
    name: propertypilot_pgdata
