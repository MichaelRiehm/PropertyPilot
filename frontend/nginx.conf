# PropertyPilot frontend — nginx config used inside the Docker runtime image.
# Serves the Vite production bundle and reverse-proxies the API to the
# `backend` service on the shared compose network.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the entry HTML so users always get the latest bundle hash.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Long-cache fingerprinted assets emitted by Vite.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — React Router handles unknown paths client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
